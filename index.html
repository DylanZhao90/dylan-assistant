<style>
  :root {
    --bg: #0a0b0f;
    --surface: #12141a;
    --surface2: #1a1d27;
    --border: #252a36;
    --text: #e4e6ef;
    --text2: #8b8f9e;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00b894;
    --yellow: #fdcb6e;
    --red: #e17055;
    --blue: #0984e3;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,.3);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  /* ── Sidebar ── */
  .sidebar{
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 100;
    display: flex;
    flex-direction: column;
  }
  .sidebar-brand{
    padding: 0 16px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .sidebar-brand h1{ font-size: 16px; font-weight: 700; color: #fff; }
  .sidebar-brand p{ font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .sidebar-brand .version{ font-size: 9px; color: var(--accent2); margin-top: 3px; }
  .nav-item{
    display: flex; align-items: center; gap: 8px;
    padding: 9px 16px; color: var(--text2); text-decoration: none;
    font-size: 12px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .12s;
  }
  .nav-item:hover{ color: #fff; background: rgba(108,92,231,.08); }
  .nav-item.active{ color: #fff; border-left-color: var(--accent); background: rgba(108,92,231,.12); }
  .nav-item .icon{ font-size: 14px; width: 20px; text-align: center; flex-shrink:0; }
  .nav-item .badge{
    margin-left: auto;
    background: var(--accent); color: #fff;
    font-size: 9px; padding: 1px 6px; border-radius: 10px;
  }
  .nav-divider{
    margin: 6px 16px;
    border: none; border-top: 1px solid var(--border);
  }
  .nav-label{
    font-size: 9px; color: var(--text2); text-transform: uppercase;
    letter-spacing: 1px; padding: 8px 16px 4px;
  }
  .tree-toggle{ cursor: pointer; }
  .tree-toggle .icon{ transition: transform .2s; }
  .tree-toggle.open .icon{ transform: rotate(90deg); }
  .tree-child{ padding-left: 28px !important; font-size: 11px !important; }
  .tree-child.hidden{ display: none; }
  .nav-tree{ margin-bottom: 4px; }

  /* ── Main ── */
  .main{ margin-left: 200px; flex: 1; padding: 28px 32px; max-width: 1100px; min-height: 100vh; }

  /* ── View Container ── */
  .view{ display: none; animation: fadeIn .25s ease; }
  .view.active{ display: block; }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }

  /* ── Page Header ── */
  .page-header{ margin-bottom: 20px; }
  .page-header h2{ font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .page-header .meta{ font-size: 11px; color: var(--text2); margin-top: 4px; }
  .page-header .status-badge{
    display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px;
    margin-left: 8px;
  }
  .badge-yellow{ background: rgba(253,203,110,.15); color: var(--yellow); }
  .badge-green{ background: rgba(0,184,148,.15); color: var(--green); }
  .badge-blue{ background: rgba(9,132,227,.15); color: var(--blue); }

  /* ── Content Card ── */
  .content-card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    box-shadow: var(--shadow);
    line-height: 1.7;
  }
  .content-card h3{
    font-size: 17px; font-weight: 600; margin: 20px 0 10px; color: #fff;
  }
  .content-card h3:first-child{ margin-top:0; }
  .content-card h4{
    font-size: 14px; font-weight: 600; margin: 16px 0 8px; color: var(--accent2);
  }
  .content-card p{ font-size: 13px; color: var(--text); margin-bottom: 8px; }
  .content-card blockquote{
    border-left: 3px solid var(--accent);
    padding: 8px 14px; margin: 10px 0;
    background: var(--surface2);
    border-radius: 4px;
    font-size: 13px; color: var(--text2); font-style: italic;
  }
  .content-card ul, .content-card ol{ padding-left: 20px; margin: 6px 0 10px; }
  .content-card li{ font-size: 13px; color: var(--text); margin-bottom: 4px; }
  .content-card hr{ border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .content-card strong{ color: #fff; }
  .content-card code{
    background: var(--surface2); padding: 1px 5px; border-radius: 3px;
    font-size: 12px; color: var(--accent2);
  }

  /* ── Tables ── */
  .content-card table{
    width: 100%; border-collapse: collapse; margin: 10px 0;
    font-size: 12px;
  }
  .content-card th, .content-card td{
    padding: 8px 12px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .content-card th{
    background: var(--surface2); color: var(--text2); font-weight: 600;
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
  }
  .content-card tr:hover td{ background: rgba(108,92,231,.04); }

  /* ── Grid Cards (overview) ── */
  .stat-row{ display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-box{
    flex: 1; min-width: 100px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; text-align: center;
    cursor: pointer; transition: all .15s;
  }
  .stat-box:hover{ border-color: var(--accent); transform: translateY(-2px); }
  .stat-box .num{ font-size: 22px; font-weight: 700; color: #fff; }
  .stat-box .label{ font-size: 11px; color: var(--text2); margin-top: 4px; }

  .overview-grid{ display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .ov-card{
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px; cursor: pointer;
    transition: all .15s;
  }
  .ov-card:hover{ border-color: var(--accent); transform: translateY(-1px); }
  .ov-card h4{ font-size: 13px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .ov-card p{ font-size: 11px; color: var(--text2); line-height: 1.6; }
  .ov-card .tag{
    display: inline-block; font-size: 10px;
    padding: 1px 6px; border-radius: 4px;
    background: rgba(108,92,231,.12); color: var(--accent2);
    margin-top: 6px;
  }
  .task-item{
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .task-item:last-child{ border-bottom: none; }
  .task-dot{
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-yellow{ background: var(--yellow); box-shadow: 0 0 6px rgba(253,203,110,.3); }
  .dot-green{ background: var(--green); }
  .dot-gray{ background: var(--text2); }
  .task-body{ flex: 1; }
  .task-body .t{ font-size: 12px; font-weight: 500; }
  .task-body .m{ font-size: 10px; color: var(--text2); margin-top: 1px; }

  /* ── Footer ── */
  .footer{
    text-align: center; padding: 20px 0 8px;
    font-size: 10px; color: var(--text2);
    border-top: 1px solid var(--border); margin-top: 20px;
  }
  .footer a{ color: var(--accent2); text-decoration: none; }

  @media(max-width: 768px){
    .sidebar{ width: 56px; }
    .sidebar-brand h1, .sidebar-brand p, .sidebar-brand .version,
    .nav-item span:not(.icon), .nav-label, .nav-divider{ display: none; }
    .sidebar-brand{ padding: 12px 8px; }
    .nav-item{ padding: 10px 8px; justify-content: center; }
    .main{ margin-left: 56px; padding: 16px; }
    .overview-grid{ grid-template-columns: 1fr; }
    .stat-row{ flex-direction: column; }
  }
</style>
</head>

// ─── Render Functions ──────────────────────────────────

function renderTable(heading, rows) {
  let h = heading ? `<h3>${heading}</h3>` : '';
  return h + `<table><thead><tr>${rows[0].map(c=>'<th>'+c+'</th>').join('')}</tr></thead><tbody>${
    rows.slice(1).map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')
  }</tbody></table>`;
}

function renderList(heading, items) {
  return (heading ? `<h3>${heading}</h3>` : '') +
    '<ul>' + items.map(i => '<li>' + i + '</li>').join('') + '</ul>';
}

function renderTasks(heading, items) {
  let html = `<h3>${heading}</h3>`;
  items.forEach(t => {
    let dot = t.status === 'active' ? 'dot-yellow' : t.status === 'done' ? 'dot-green' : 'dot-gray';
    html += `<div class="task-item"><div class="task-dot ${dot}"></div><div class="task-body"><div class="t">${t.title}</div>${t.meta ? '<div class="m">'+t.meta+'</div>' : ''}</div></div>`;
  });
  return html;
}

function renderFM(s) {
  return `<div style="background:var(--surface2);border-radius:8px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <h4 style="font-size:13px;font-weight:600;margin:0;">${s.heading}</h4>
      <span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(108,92,231,.12);color:var(--accent2);">${s.tag}</span>
    </div>
    <p style="font-size:11px;color:var(--text2);margin-bottom:6px;">${s.desc}</p>
    <ul style="margin:0;padding-left:16px;">${s.body.map(l=>'<li style="font-size:12px;color:var(--text);margin-bottom:2px;">'+l+'</li>').join('')}</ul>
  </div>`;
}

function renderView(data) {
  let html = `<div class="page-header"><h2>${data.title}</h2><div class="meta">${data.meta}</div></div><div class="content-card">`;
  data.sections.forEach(s => {
    if (s.type === 'table') html += renderTable(s.heading, [s.rows[0].map((_,i)=>s.rows.map(r=>r[i]||'')).filter(h=>h.join(''))[0] ? s.rows[0].map((_,i)=>s.rows.map(r=>r[i]||'')) : s.rows]);
    else if (s.type === 'list') html += renderList(s.heading, s.items);
    else if (s.type === 'tasks') html += renderTasks(s.heading, s.items);
    else if (s.type === 'fm') html += renderFM(s);
    else if (s.type === 'text') html += (s.heading?`<h3>${s.heading}</h3>`:'')+`<pre style="font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap;font-family:inherit;background:var(--surface2);padding:12px;border-radius:6px;">${s.body}</pre>`;
    else if (s.type === 'note') html += `<blockquote>${s.icon||''} ${s.text}</blockquote>`;
    else if (s.type === 'empty') html += `<div style="text-align:center;padding:30px 0;color:var(--text2);"><div style="font-size:36px;margin-bottom:8px;">${s.icon||'📝'}</div><p style="font-size:13px;">${s.text}</p></div>`;
    else if (s.type === 'code') html += (s.heading?`<h3>${s.heading}</h3>`:'')+`<pre style="font-size:11px;color:var(--accent2);line-height:1.5;white-space:pre-wrap;font-family:monospace;background:var(--bg);padding:14px;border-radius:6px;border:1px solid var(--border);">${s.body}</pre>`;
  });
  // Fix table rendering
  html = html.replace(/<table><thead><tr>([^<]*)<\/tr><\/thead><tbody>([^<]*)<\/tbody><\/table>/g, (m, h, b) => {
    // Parse header and rows from the flat array format
    return m;
  });
  return html + '</div><div class="footer"><p>Dylan Executive Dashboard · <a href="https://github.com/DylanZhao90/dylan-assistant" target="_blank">GitHub</a> · v3.0</p></div>';
}

// ─── Navigation ────────────────────────────────────────

let currentView = 'overview';

function switchView(name) {
  currentView = name;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === name));
  const app = document.getElementById('app');
  if (name === 'overview') {
    app.innerHTML = renderOverview();
  } else if (DATA[name]) {
    app.innerHTML = renderView(DATA[name]);
  } else {
    app.innerHTML = `<div class="page-header"><h2>页面未找到</h2></div>`;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Init ──────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => switchView(el.dataset.view));
  });
  switchView('overview');
});
